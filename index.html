<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Europa 2026 — Jose, Heberth, Pepe y Warren</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0e0d;
  --surface: #1a1917;
  --surface2: #242220;
  --border: #2e2c29;
  --text: #f0ede8;
  --muted: #8a847a;
  --gold: #c9a84c;
  --gold-lt: #f5e6c8;
  --radius: 12px;
  --radius-sm: 8px;
  --city-color: #c9a84c;
  --city-accent: #f5e6c8;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  padding-bottom: var(--safe-bottom);
  -webkit-tap-highlight-color: transparent;
}

/* ── NAV ── */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(15,14,13,0.94); backdrop-filter: blur(14px) saturate(1.4);
  -webkit-backdrop-filter: blur(14px) saturate(1.4);
  border-bottom: 1px solid var(--border);
  padding: 0 16px; height: 52px;
  display: flex; align-items: center; gap: 6px;
  overflow-x: auto; scrollbar-width: none;
}
.nav::-webkit-scrollbar { display: none; }
.nav-city {
  flex-shrink: 0; padding: 6px 13px; border-radius: 999px;
  font-size: 11px; font-weight: 500; border: 1px solid var(--border);
  background: transparent; color: var(--muted); cursor: pointer;
  transition: all .2s; white-space: nowrap; font-family: 'DM Sans', sans-serif;
  letter-spacing: 0.01em;
}
.nav-city.active { background: var(--city-color); color: #1a1917; border-color: var(--city-color); font-weight: 600; }
.nav-city:hover:not(.active) { border-color: var(--muted); color: var(--text); }
.nav-brand {
  font-family: 'Playfair Display', serif; font-size: 13px;
  color: var(--gold); white-space: nowrap; margin-right: 6px; flex-shrink: 0;
  cursor: pointer; user-select: none;
}

/* ── TOAST ── */
.toast {
  position: fixed; top: 64px; left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: var(--gold); color: var(--bg);
  padding: 7px 16px; border-radius: 999px;
  font-size: 11px; font-weight: 600;
  opacity: 0; pointer-events: none;
  transition: all 0.28s cubic-bezier(0.16, 1, 0.3, 1);
  z-index: 1000; box-shadow: 0 6px 20px rgba(0,0,0,0.5);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── ERROR MESSAGE ── */
.error-box {
  max-width: 900px; margin: 80px auto; padding: 30px;
  background: #2d1414; border: 1px solid #c62828; border-radius: var(--radius);
  color: #ef9a9a; font-size: 13px; white-space: pre-wrap;
}

/* ── HERO ── */
.hero { padding: 72px 20px 24px; max-width: 900px; margin: 0 auto; }
.hero-eyebrow { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
.hero-title { font-family: 'Playfair Display', serif; font-size: clamp(28px, 6vw, 52px); line-height: 1.12; margin-bottom: 14px; }
.hero-title em { color: var(--gold); font-style: italic; }
.hero-meta { display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; color: var(--muted); }
.hero-meta span { display: flex; align-items: center; gap: 5px; }

/* ── SEARCH ── */
.search-wrap { max-width: 900px; margin: 0 auto; padding: 0 20px 16px; }
.search-input {
  width: 100%; padding: 10px 16px; border-radius: var(--radius-sm);
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); font-size: 13px; font-family: 'DM Sans', sans-serif;
  outline: none; transition: border-color .2s;
}
.search-input:focus { border-color: var(--gold); }
.search-input::placeholder { color: var(--muted); }

/* ── DESTINATION ── */
.destination { display: none; max-width: 900px; margin: 0 auto; padding: 0 20px 60px; }
.destination.active { display: block; }

.city-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 10px; }
.city-title { font-family: 'Playfair Display', serif; font-size: 34px; display: flex; align-items: center; gap: 10px; }
.city-dates { font-size: 12px; color: var(--muted); margin-top: 3px; }
.city-badge { padding: 5px 12px; border-radius: 999px; font-size: 11px; font-weight: 600; background: var(--city-color); color: var(--bg); display: inline-block; }
.nav-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.nav-btn {
  padding: 7px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: var(--surface); color: var(--muted); cursor: pointer;
  font-size: 11px; font-weight: 500; transition: all .2s;
  font-family: 'DM Sans', sans-serif; display: flex; align-items: center; gap: 4px;
}
.nav-btn:hover { border-color: var(--city-color); color: var(--text); }
.nav-btn.next { background: var(--city-color); border-color: var(--city-color); color: var(--bg); font-weight: 600; }
.nav-btn.next:hover { opacity: .85; }

/* ── SECTIONS ── */
.section { margin-bottom: 16px; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.section-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; background: var(--surface); cursor: pointer; user-select: none; transition: background .15s; }
.section-header:hover { background: var(--surface2); }
.section-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; display: flex; align-items: center; gap: 9px; }
.section-icon { font-size: 15px; }
.section-toggle { font-size: 16px; color: var(--muted); transition: transform .22s ease; }
.section-body { padding: 18px; background: var(--bg); display: none; border-top: 1px solid var(--border); }
.section-body.open { display: block; }
.section.open .section-toggle { transform: rotate(180deg); }

/* ── HOTEL CARD ── */
.hotel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 600px) { .hotel-grid { grid-template-columns: 1fr; } }
.hotel-field { display: flex; flex-direction: column; gap: 3px; }
.field-label { font-size: 9px; text-transform: uppercase; letter-spacing: .09em; color: var(--muted); }
.field-value { font-size: 13px; color: var(--text); }
.field-value a { color: var(--gold); text-decoration: none; }
.field-value a:hover { text-decoration: underline; }
.field-value.editable {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; padding: 6px 10px; outline: none;
  color: var(--text); font-size: 13px; font-family: 'DM Sans', sans-serif;
  width: 100%; transition: border-color 0.2s;
}
.field-value.editable:focus { border-color: var(--city-color); }
.field-value.editable::placeholder { color: #555; font-size: 11px; }
.hotel-note { margin-top: 14px; padding: 11px; background: var(--surface); border-radius: var(--radius-sm); font-size: 11px; color: var(--muted); border-left: 3px solid var(--city-color); }

/* ── FLIGHTS ── */
.flight-card { display: flex; align-items: center; gap: 14px; padding: 12px; background: var(--surface); border-radius: var(--radius-sm); margin-bottom: 9px; flex-wrap: wrap; }
.flight-type { font-size: 9px; text-transform: uppercase; letter-spacing: .1em; padding: 3px 8px; border-radius: 999px; color: var(--bg); font-weight: 600; flex-shrink: 0; }
.flight-route { flex: 1; min-width: 140px; }
.flight-from-to { font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 7px; }
.flight-arrow { color: var(--city-color); }
.flight-date { font-size: 11px; color: var(--muted); margin-top: 1px; }
.flight-fields { display: flex; gap: 8px; flex-wrap: wrap; }
.flight-input {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 5px; padding: 5px 8px; color: var(--text);
  font-size: 11px; font-family: 'DM Sans', sans-serif;
  outline: none; width: 110px; transition: border-color 0.2s;
}
.flight-input:focus { border-color: var(--city-color); }
.flight-input::placeholder { color: #555; }
.flight-note { font-size: 10px; color: var(--muted); margin-top: 4px; flex-basis: 100%; }

/* ── ACTIVITIES ── */
.activity-card { display: grid; grid-template-columns: auto 1fr auto; gap: 12px; align-items: start; padding: 12px; background: var(--surface); border-radius: var(--radius-sm); margin-bottom: 9px; }
.activity-icon { font-size: 20px; padding-top: 1px; }
.activity-name { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
.activity-meta { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
.tag { font-size: 9px; padding: 2px 7px; border-radius: 999px; font-weight: 500; }
.tag-reserva-si { background: #FAE0E0; color: #8B1A1A; }
.tag-reserva-no { background: #D6F0DC; color: #1E6B2E; }
.tag-reserva-rec { background: #FFF0CC; color: #7A5000; }
.tag-cost { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
.activity-link a { font-size: 13px; color: var(--gold); text-decoration: none; white-space: nowrap; }
.activity-link a:hover { text-decoration: underline; }
.reserva-block { margin-top: 9px; padding: 10px; background: var(--bg); border-radius: 6px; border-left: 2px solid; font-size: 11px; }
.rb-critica { border-color: #c62828; }
.rb-alta { border-color: #C9A84C; }
.rb-media { border-color: #2E7D32; }
.rb-walk { border-color: #555; }
.rb-label { font-weight: 600; font-size: 9px; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 2px; }
.rb-critica .rb-label { color: #e57373; }
.rb-alta .rb-label { color: var(--gold); }
.rb-media .rb-label { color: #81c784; }
.rb-walk .rb-label { color: var(--muted); }

/* ── RESTAURANTS ── */
.resto-card { padding: 12px; background: var(--surface); border-radius: var(--radius-sm); margin-bottom: 9px; display: grid; grid-template-columns: 1fr auto; gap: 10px; }
.resto-name { font-size: 13px; font-weight: 600; margin-bottom: 1px; }
.resto-tipo { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
.resto-pedir { font-size: 11px; color: var(--text); margin-bottom: 4px; }
.resto-pedir strong { color: var(--gold); }
.resto-right { text-align: right; flex-shrink: 0; }
.resto-precio { font-size: 12px; font-weight: 600; color: var(--text); }
.resto-reserva-badge { display: inline-block; margin-top: 4px; font-size: 9px; padding: 2px 7px; border-radius: 999px; font-weight: 600; }
.rsb-si { background: #FAE0E0; color: #8B1A1A; }
.rsb-walk { background: #D6F0DC; color: #1E6B2E; }
.rsb-rec { background: #FFF0CC; color: #7A5000; }
.resto-cuando { font-size: 10px; color: var(--muted); margin-top: 3px; }

/* ── RESERVAS CALENDARIO ── */
.cal-card { display: flex; gap: 10px; align-items: flex-start; padding: 11px; background: var(--surface); border-radius: var(--radius-sm); margin-bottom: 7px; border-left: 3px solid; }
.cal-critica { border-color: #c62828; }
.cal-alta { border-color: #C9A84C; }
.cal-media { border-color: #2E7D32; }
.cal-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.cal-dot-critica { background: #c62828; }
.cal-dot-alta { background: #C9A84C; }
.cal-dot-media { background: #2E7D32; }
.cal-fecha { font-size: 11px; font-weight: 700; color: var(--gold); margin-bottom: 2px; }
.cal-accion { font-size: 12px; color: var(--text); margin-bottom: 3px; }
.cal-url { font-size: 10px; color: var(--gold); text-decoration: none; }
.cal-url:hover { text-decoration: underline; }
.cal-badge { display: inline-block; font-size: 9px; padding: 1px 6px; border-radius: 999px; font-weight: 600; margin-bottom: 3px; }
.cal-badge-critica { background: #FAE0E0; color: #8B1A1A; }
.cal-badge-alta { background: #FFF0CC; color: #7A5000; }
.cal-badge-media { background: #D6F0DC; color: #1E6B2E; }

/* ── BACKUP BTN ── */
.backup-bar { max-width: 900px; margin: 0 auto; padding: 0 20px 12px; display: flex; gap: 8px; flex-wrap: wrap; }
.backup-btn {
  padding: 6px 12px; border-radius: 999px; border: 1px solid var(--border);
  background: var(--surface); color: var(--muted); cursor: pointer;
  font-size: 10px; font-family: 'DM Sans', sans-serif;
  transition: all .2s; display: flex; align-items: center; gap: 4px;
}
.backup-btn:hover { border-color: var(--gold); color: var(--text); }

/* ── FOOTER NAV ── */
.footer-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); }
.footer-progress { font-size: 11px; color: var(--muted); }

/* ── OVERVIEW ── */
.overview { display: none; max-width: 900px; margin: 0 auto; padding: 0 20px 60px; }
.overview.active { display: block; }
.overview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 12px; margin-top: 6px; }
.overview-card {
  padding: 18px; background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border); cursor: pointer; transition: all .2s;
  position: relative; overflow: hidden;
}
.overview-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--city-color); }
.overview-card:hover { border-color: var(--city-color); transform: translateY(-2px); }
.ov-flag { font-size: 26px; margin-bottom: 6px; }
.ov-city { font-family: 'Playfair Display', serif; font-size: 20px; margin-bottom: 3px; }
.ov-country { font-size: 11px; color: var(--muted); margin-bottom: 10px; }
.ov-dates { font-size: 11px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
.ov-nights { font-size: 10px; color: var(--muted); }
.ov-hotel { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 11px; color: var(--muted); }
.ov-hotel strong { color: var(--text); display: block; margin-bottom: 1px; font-size: 12px; }
.cal-section-title { font-size: 13px; font-weight: 600; color: var(--text); margin: 20px 0 10px; display: flex; align-items: center; gap: 7px; }

/* ── COUNTDOWN ── */
.countdown-bar { display: flex; gap: 12px; margin-top: 18px; flex-wrap: wrap; }
.countdown-item { flex: 1; min-width: 70px; padding: 14px; background: var(--surface); border-radius: var(--radius); text-align: center; border: 1px solid var(--border); }
.countdown-num { font-family: 'Playfair Display', serif; font-size: 30px; color: var(--gold); line-height: 1; }
.countdown-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 3px; }

/* ── KEYBOARD HINT ── */
.kbd-hint { font-size: 10px; color: var(--muted); text-align: center; padding: 6px; opacity: 0.7; }

@media (min-width: 700px) {
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
}
</style>

// ─── UTILS ───────────────────────────────────────────────────────────────────
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}
function escapeAttr(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function urgBadge(u) {
  const labels = { critica:"CRITICA", alta:"ALTA", media:"MEDIA", walk:"WALK-IN" };
  const cls = { critica:"tag-reserva-si", alta:"tag-reserva-rec", media:"tag-reserva-rec", walk:"tag-reserva-no" };
  return `<span class="tag ${cls[u]||'tag-reserva-no'}">${labels[u]||u}</span>`;
}

function urbClass(u) {
  return { critica:"critica", alta:"alta", media:"media", walk:"walk" }[u] || "walk";
}

function section(id, icon, title, content, openByDefault) {
  try {
    const saved = loadField('sec-' + id);
    const isOpen = saved !== '' ? (saved === 'true') : openByDefault;
    const openClass = isOpen ? " open" : "";
    const bodyClass = isOpen ? " open" : "";
    return `
    <div class="section${openClass}" id="sec-${id}">
      <div class="section-header" onclick="toggleSection('sec-${id}')">
        <span class="section-title"><span class="section-icon">${icon}</span>${title}</span>
        <span class="section-toggle">⌃</span>
      </div>
      <div class="section-body${bodyClass}">${content}</div>
    </div>`;
  } catch(e) {
    console.error(e);
    return `<div class="error-box">Error generando sección ${id}: ${escapeHtml(e.message)}</div>`;
  }
}

function toggleSection(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const isOpen = el.classList.toggle("open");
  el.querySelector(".section-body").classList.toggle("open");
  saveField('sec-' + id, isOpen ? 'true' : 'false');
}

// ─── RENDER OVERVIEW ─────────────────────────────────────────────────────────
function renderOverview() {
  try {
    const now = new Date();
    const dep = TRIP.departure;
    const diffDays = Math.ceil((dep.getTime() - now.getTime()) / (1000*60*60*24));
    const days = Math.max(0, diffDays);
    const weeks = Math.floor(days / 7);
    let months = (dep.getFullYear() - now.getFullYear()) * 12 + (dep.getMonth() - now.getMonth());
    if (now.getDate() > dep.getDate()) months--;
    months = Math.max(0, months);

    const query = searchQuery.toLowerCase().trim();
    const filteredDests = query
      ? TRIP.destinations.filter(d =>
          d.city.toLowerCase().includes(query) ||
          d.country.toLowerCase().includes(query) ||
          d.hotel.name.toLowerCase().includes(query) ||
          d.id.toLowerCase().includes(query)
        )
      : TRIP.destinations;

    const cards = filteredDests.length > 0
      ? filteredDests.map(d => `
      <div class="overview-card" onclick="showCity('${d.id}')" style="--city-color:${d.color}">
        <div class="ov-flag">${d.flag}</div>
        <div class="ov-city">${d.city}</div>
        <div class="ov-country">${d.country}</div>
        <div class="ov-dates">${d.arrival} — ${d.departure}</div>
        <div class="ov-nights">${d.nights} noches</div>
        <div class="ov-hotel"><strong>${d.hotel.name}</strong>Check-in ${d.hotel.checkin} · Check-out ${d.hotel.checkout}</div>
      </div>`).join('')
      : `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted)">Sin resultados para "${escapeHtml(searchQuery)}"</div>`;

    const allRes = [];
    TRIP.destinations.forEach(d => {
      d.reservas.forEach(r => allRes.push({...r, city:d.city, color:d.color}));
    });
    allRes.sort((a,b) => {
      if (a.fechaOrd && b.fechaOrd) return a.fechaOrd - b.fechaOrd;
      if (a.fechaOrd) return -1;
      if (b.fechaOrd) return 1;
      return 0;
    });
    const calHtml = allRes.map(r => {
      const uc = urbClass(r.urgencia);
      return `<div class="cal-card cal-${uc}">
        <div class="cal-dot cal-dot-${uc}"></div>
        <div>
          <span class="cal-badge cal-badge-${uc}">${r.urgencia.toUpperCase()}</span>
          <div class="cal-fecha">${r.fecha} — ${r.city}</div>
          <div class="cal-accion">${r.accion}</div>
          ${r.url ? `<a class="cal-url" href="https://${escapeAttr(r.url)}" target="_blank" rel="noopener">${escapeHtml(r.url)} ↗</a>` : ''}
        </div>
      </div>`;
    }).join('');

    return `
    <div class="overview active" id="view-overview">
      <div class="hero" style="padding-top:68px">
        <div class="hero-eyebrow">Itinerario personal · 4 viajeros</div>
        <h1 class="hero-title">Europa 2026<br><em>${TRIP.traveler}</em></h1>
        <div class="hero-meta">
          <span>📅 ${TRIP.dates}</span>
          <span>🏙 6 ciudades · 16 noches</span>
          <span>🛫 YYJ Victoria, BC · Hora base PDT</span>
        </div>
        <div class="countdown-bar">
          <div class="countdown-item"><div class="countdown-num">${months}</div><div class="countdown-label">Meses</div></div>
          <div class="countdown-item"><div class="countdown-num">${weeks}</div><div class="countdown-label">Semanas</div></div>
          <div class="countdown-item"><div class="countdown-num">${days}</div><div class="countdown-label">Días Totales</div></div>
          <div class="countdown-item"><div class="countdown-num">6</div><div class="countdown-label">Ciudades</div></div>
          <div class="countdown-item"><div class="countdown-num">16</div><div class="countdown-label">Noches</div></div>
        </div>
      </div>
      <div style="max-width:900px;margin:0 auto;padding:0 20px">
        <div class="search-wrap">
          <input class="search-input" type="text" placeholder="🔍 Buscar ciudad, país, hotel..." value="${escapeHtml(searchQuery)}" oninput="onSearch(this.value)" id="searchInput">
        </div>
        <div class="backup-bar">
          <button class="backup-btn" onclick="exportBackup()">📥 Exportar datos</button>
          <button class="backup-btn" onclick="document.getElementById('importFile').click()">📤 Importar datos</button>
          <input type="file" id="importFile" accept=".json" style="display:none" onchange="importBackup(this)">
          <span class="kbd-hint" style="margin-left:auto;">⌨ ← → para navegar</span>
        </div>
        <div class="overview-grid">${cards}</div>
        <div class="cal-section-title">🔔 Calendario de Acciones — Ordenado por fecha (Hora Victoria, BC)</div>
        <div class="global-cal">${calHtml}</div>
      </div>
    </div>`;
  } catch(e) {
    console.error(e);
    return `<div class="error-box"><strong>Error al cargar el resumen:</strong> ${escapeHtml(e.message)}<br><small>Revisa la consola (F12) para más detalles.</small></div>`;
  }
}

function onSearch(val) {
  searchQuery = val;
  if (currentView === 'overview') {
    renderApp();
    setTimeout(() => {
      const inp = document.getElementById('searchInput');
      if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
    }, 50);
  }
}

// ─── RENDER CITY ─────────────────────────────────────────────────────────────
function renderCity(d) {
  try {
    const idx = TRIP.destinations.findIndex(x => x.id === d.id);
    const prev = TRIP.destinations[idx-1];
    const next = TRIP.destinations[idx+1];

    // HOTEL
    const hotelHtml = `
      <div class="hotel-grid">
        <div class="hotel-field"><span class="field-label">Hotel</span><span class="field-value">${d.hotel.name}</span></div>
        <div class="hotel-field"><span class="field-label">Dirección</span><span class="field-value">${d.hotel.address}</span></div>
        <div class="hotel-field"><span class="field-label">Teléfono</span><span class="field-value"><a href="tel:${d.hotel.phone.replace(/\s/g,'')}">${d.hotel.phone}</a></span></div>
        <div class="hotel-field"><span class="field-label">Check-in / Check-out</span><span class="field-value">${d.hotel.checkin} → ${d.hotel.checkout}</span></div>
        <div class="hotel-field"><span class="field-label">Confirmación</span><input class="field-value editable" placeholder="Nº de confirmación" id="conf-${d.id}" value="${escapeHtml(loadField('conf-'+d.id) || d.hotel.confirmation || '')}" onchange="saveField('conf-'+d.id,this.value)"></div>
        <div class="hotel-field"><span class="field-label">Tipo de habitación</span><input class="field-value editable" placeholder="Tipo de habitación" id="room-${d.id}" value="${escapeHtml(loadField('room-'+d.id) || d.hotel.room || '')}" onchange="saveField('room-'+d.id,this.value)"></div>
      </div>
      ${d.hotel.notes ? `<div class="hotel-note">💡 ${d.hotel.notes}</div>` : ''}`;

    // FLIGHTS
    const flightsHtml = d.flights.map((f,i) => {
      const fnKey = 'fl-num-'+d.id+'-'+i;
      const ftKey = 'fl-time-'+d.id+'-'+i;
      const fcKey = 'fl-conf-'+d.id+'-'+i;
      const flightNumSaved = loadField(fnKey);
      const flightTimeSaved = loadField(ftKey);
      const flightConfSaved = loadField(fcKey);
      const flightNumber = flightNumSaved || f.flightNumber || '';
      const flightTime = flightTimeSaved || (f.departureTime ? f.departureTime + ' → ' + f.arrivalTime : '');
      const flightConf = flightConfSaved || f.conf || '';
      const noteHtml = f.note ? `<div class="flight-note">📌 ${f.note}</div>` : '';
      return `
      <div class="flight-card">
        <span class="flight-type" style="background:${d.color}">${f.type}</span>
        <div class="flight-route">
          <div class="flight-from-to">${f.from} <span class="flight-arrow">→</span> ${f.to}</div>
          <div class="flight-date">${f.date}</div>
          ${noteHtml}
        </div>
        <div class="flight-fields">
          <input class="flight-input" placeholder="# Vuelo" id="${fnKey}" value="${escapeHtml(flightNumber)}" onchange="saveField('${fnKey}',this.value)">
          <input class="flight-input" placeholder="Hora" id="${ftKey}" value="${escapeHtml(flightTime)}" onchange="saveField('${ftKey}',this.value)">
          <input class="flight-input" placeholder="Confirmación" id="${fcKey}" value="${escapeHtml(flightConf)}" onchange="saveField('${fcKey}',this.value)">
        </div>
      </div>`;
    }).join('');

    // MUST DO
    const mustDoHtml = d.mustdo.map(a => {
      const uc = urbClass(a.urgencia||'walk');
      const rbClass = `rb-${uc}`;
      const reservaInfo = a.urgencia !== 'walk' ? `
        <div class="reserva-block ${rbClass}">
          <div class="rb-label">⏰ Reservar desde Victoria: ${a.cuando_victoria}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:1px">${a.nota}</div>
          ${a.url ? `<a href="https://${escapeAttr(a.url)}" target="_blank" rel="noopener" style="color:var(--gold);font-size:10px">${escapeHtml(a.url)} ↗</a>` : ''}
        </div>` : `<div style="font-size:11px;color:var(--muted);margin-top:5px">${a.nota}</div>`;
      return `
      <div class="activity-card">
        <div class="activity-icon">${a.tipo.includes('Museo')?'🏛':a.tipo.includes('Gastro')||a.tipo.includes('Cafe')||a.tipo.includes('mercado')||a.tipo.includes('Mercado')?'🍽':a.tipo.includes('Historia')||a.tipo.includes('Cultura')?'🏛':a.tipo.includes('Barrio')||a.tipo.includes('Paseo')?'🚶':'📍'}</div>
        <div>
          <div class="activity-name">${a.name}</div>
          <div class="activity-meta">
            ${urgBadge(a.urgencia||'walk')}
            <span class="tag tag-cost">${a.cost}</span>
            <span class="tag tag-cost">${a.tipo}</span>
          </div>
          ${reservaInfo}
        </div>
        <div class="activity-link">${a.url ? `<a href="https://${escapeAttr(a.url)}" target="_blank" rel="noopener">↗</a>` : ''}</div>
      </div>`;
    }).join('');

    // RESTAURANTS
    const restosHtml = d.restaurants.map(r => `
      <div class="resto-card">
        <div>
          <div class="resto-name">${r.name}</div>
          <div class="resto-tipo">${r.tipo}</div>
          <div class="resto-pedir">Pedir: <strong>${r.pedir}</strong></div>
          <div class="resto-cuando" style="color:var(--muted);font-size:10px">⏰ ${r.cuando}</div>
        </div>
        <div class="resto-right">
          <div class="resto-precio">${r.precio}</div>
          <div><span class="resto-reserva-badge ${r.badge}">${r.reserva}</span></div>
        </div>
      </div>`).join('');

    // CALENDARIO RESERVAS
    const reservasSorted = [...d.reservas].sort((a,b) => {
      if (a.fechaOrd && b.fechaOrd) return a.fechaOrd - b.fechaOrd;
      if (a.fechaOrd) return -1;
      if (b.fechaOrd) return 1;
      return 0;
    });
    const calHtml = reservasSorted.map(r => {
      const uc = urbClass(r.urgencia);
      return `<div class="cal-card cal-${uc}">
        <div class="cal-dot cal-dot-${uc}"></div>
        <div>
          <span class="cal-badge cal-badge-${uc}">${r.urgencia.toUpperCase()}</span>
          <div class="cal-fecha">${r.fecha}</div>
          <div class="cal-accion">${r.accion}</div>
          ${r.url ? `<a class="cal-url" href="https://${escapeAttr(r.url)}" target="_blank" rel="noopener">${escapeHtml(r.url)} ↗</a>` : ''}
        </div>
      </div>`;
    }).join('');

    const prevBtn = prev ? `<button class="nav-btn" onclick="showCity('${prev.id}')">← ${prev.city}</button>` : `<button class="nav-btn" onclick="showOverview()">← Resumen</button>`;
    const nextBtn = next ? `<button class="nav-btn next" onclick="showCity('${next.id}')">${next.city} →</button>` : `<button class="nav-btn" onclick="showOverview()" style="background:var(--gold);border-color:var(--gold);color:var(--bg);font-weight:600">Volver al resumen</button>`;

    return `
    <div class="destination" id="dest-${d.id}" style="--city-color:${d.color}">
      <div class="city-header">
        <div>
          <div class="city-title">${d.flag} ${d.city}</div>
          <div class="city-dates">${d.country} · ${d.arrival} — ${d.departure} · ${d.nights} noches</div>
        </div>
        <div>
          <div class="city-badge" style="background:${d.color}">${d.hotel.name.split(' ').slice(0,3).join(' ')}</div>
          <div class="nav-btns" style="margin-top:6px">${prevBtn}${nextBtn}</div>
        </div>
      </div>
      ${section('hotel-'+d.id,'🏨','Hotel & Alojamiento', hotelHtml, true)}
      ${section('flights-'+d.id,'✈️','Vuelos / Transporte', flightsHtml, false)}
      ${section('reservas-'+d.id,'🔔','Reservas & Calendario — Hora Victoria, BC', calHtml, true)}
      ${section('mustdo-'+d.id,'📍','Actividades & Atracciones Imperdibles', mustDoHtml, true)}
      ${section('restos-'+d.id,'🍽','Restaurantes & Cafés', restosHtml, false)}
      <div class="footer-nav">
        ${prevBtn}
        <span class="footer-progress">${idx+1} / ${TRIP.destinations.length}</span>
        ${nextBtn}
      </div>
    </div>`;
  } catch(e) {
    console.error(e);
    return `<div class="error-box"><strong>Error al cargar ${d.city}:</strong> ${escapeHtml(e.message)}<br><small>Revisa la consola (F12) para más detalles.</small></div>`;
  }
}

// ─── LOCAL STORAGE & TOAST ───────────────────────────────────────────────────
function saveField(key, val) {
  try {
    localStorage.setItem('eu26_'+key, val);
    showToast('Guardado ✓');
  } catch(e) {
    showToast('Error al guardar');
  }
}

function loadField(key) {
  try { return localStorage.getItem('eu26_'+key) || ''; } catch(e) { return ''; }
}

let toastTimeout;
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => toast.classList.remove('show'), 1800);
}

// ─── BACKUP ──────────────────────────────────────────────────────────────────
function exportBackup() {
  const data = {};
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith('eu26_')) data[key] = localStorage.getItem(key);
  }
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'europa2026_backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click(); URL.revokeObjectURL(url);
  showToast('Backup descargado ✓');
}
function importBackup(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      let count = 0;
      for (const [k, v] of Object.entries(data)) {
        if (k.startsWith('eu26_')) { localStorage.setItem(k, v); count++; }
      }
      showToast(`Importados ${count} campos ✓`);
      renderApp(); updateNav();
    } catch(err) { showToast('Error: archivo inválido'); }
  };
  reader.readAsText(file); input.value = '';
}

// ─── NAVIGATION ─────────────────────────────────────────────────────────────
function showOverview() {
  currentView = "overview"; currentCityId = null; searchQuery = "";
  document.documentElement.style.setProperty('--city-color','#c9a84c');
  renderApp(); updateNav(); window.scrollTo(0,0);
}

function showCity(id) {
  currentView = "city"; currentCityId = id;
  const d = TRIP.destinations.find(x => x.id === id);
  if (d) document.documentElement.style.setProperty('--city-color', d.color);
  searchQuery = "";
  renderApp(); updateNav(); window.scrollTo(0,0);
}

function updateNav() {
  document.querySelectorAll('.nav-city').forEach((b,i) => {
    b.classList.remove('active');
    if (currentView === 'overview' && i === 0) b.classList.add('active');
    else if (currentView === 'city' && TRIP.destinations[i-1]?.id === currentCityId) b.classList.add('active');
  });
}

function renderApp() {
  const app = document.getElementById('app');
  try {
    if (currentView === 'overview') app.innerHTML = renderOverview();
    else {
      const d = TRIP.destinations.find(x => x.id === currentCityId);
      app.innerHTML = d ? `<div style="padding-top:52px">${renderCity(d)}</div>` : `<div class="error-box">Ciudad no encontrada: ${currentCityId}</div>`;
    }
  } catch(e) {
    app.innerHTML = `<div class="error-box">Error inesperado: ${escapeHtml(e.message)}</div>`;
  }
}

// ─── KEYBOARD ────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
    e.preventDefault();
    if (currentView === 'overview') {
      if (e.key === 'ArrowRight' && TRIP.destinations.length) showCity(TRIP.destinations[0].id);
    } else {
      const idx = TRIP.destinations.findIndex(x => x.id === currentCityId);
      if (e.key === 'ArrowLeft') idx > 0 ? showCity(TRIP.destinations[idx-1].id) : showOverview();
      else idx < TRIP.destinations.length-1 ? showCity(TRIP.destinations[idx+1].id) : showOverview();
    }
  }
  if (e.key === 'Escape') showOverview();
});

// ─── START ───────────────────────────────────────────────────────────────────
showOverview();
</script>
